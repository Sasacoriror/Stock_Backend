<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Stock</title>
    <link rel="stylesheet" href="Review.css">
    <script>
        fetch("../Sidebar/Sidebar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("sidenav").innerHTML = data;
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = "../Sidebar/Sidebar.css";  // Adjust path accordingly
                document.head.appendChild(link);
            });
    </script>
    <style>
        h2{
            text-align: center;
        }
    </style>
</head>
<body>
<div id="sidenav"></div>
<!--<h2>COMMING SOON</h2>-->
<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search stocks...">
    <button type="button" onclick="">Search</button>
</div>

</body>
</html>
