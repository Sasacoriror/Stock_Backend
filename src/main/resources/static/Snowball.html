<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Snapshot Table</title>
    <script src="Snowball.js"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="snowball.css">
    <script>
        fetch("index.html")
            .then(response => response.text())
            .then(data => document.getElementById("navbar").innerHTML = data);
    </script>

</head>
<body>
<div id="navbar"></div>
<h1>Projection Snapshot Table</h1>

<div class="form-container">
    <label>Stock Price: <input type="number" id="stockPrice" step="0.01" required></label>
    <label>Annual Dividend: <input type="number" id="annualDividend" step="0.01" required></label>
    <label>Expected Dividend CAGR (%): <input type="number" id="dividendCAGR" step="0.01" required></label>
    <label>Expected Stock Price CAGR (%): <input type="number" id="stockPriceCAGR" step="0.01" required></label>
    <label>Amount to Invest: <input type="number" id="amountToInvest" step="0.01" required></label>
    <label>Investment Frequency:
        <select id="investmentFrequency" required>
            <option value="oneTime">One Time</option>
            <option value="monthly">Monthly</option>
        </select>
    </label>
    <label>Dividend Frequency:
        <select id="dividendFrequency" required>
            <option value="quarterly">Quarterly</option>
            <option value="monthly">Monthly</option>
            <option value="semiAnnual">Semi-Annual</option>
            <option value="annual">Annual</option>
        </select>
    </label>
    <label>Reinvest Dividends:
        <select id="dividendReinvestment" required>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </label>
    <button type="button" onclick="calculateProjection()">Generate Table</button>
</div>

<div id="tableContainer" class="container"></div>
</body>
