<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dividends</title>
    <link rel="stylesheet" href="DividendTracker.css">
    <script src="DividendTracker.js"></script>
    <script>
        fetch("Sidebar/Sidebar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("sidenav").innerHTML = data;
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = "Sidebar/Sidebar.css";  // Adjust path accordingly
                document.head.appendChild(link);
            });
    </script>

    <style>
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
<div id="sidenav"></div>
<h1>Dividend Portfolio</h1>

<div class="form-container">
    <label>Stock ticker:
        <input type="text" id="tickerSymbol" placeholder="Ex: MSFT" required>
    </label>

    <label>Stock Price:
        <input type="number" id="theStockPrice" placeholder="Ex: 100$" required>
    </label>

    <label>How many shares:
        <input type="number" id="shares" placeholder="Ex: 5" required>
    </label>


    <button onclick="sendData()">Add</button>
    <div id="value"></div>
</div>
</body>
</html>
