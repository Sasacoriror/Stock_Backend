<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Portfolio</title>
    <script src="Portfolio.js" defer></script>
    <link rel="stylesheet" href="Portfolio.css">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch("../Sidebar/Sidebar.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("sidenav").innerHTML = data;
                    const link = document.createElement("link");
                    link.rel = "stylesheet";
                    link.href = "../Sidebar/Sidebar.css";
                    document.head.appendChild(link);
                });
        });
    </script>
    <style>
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>
<div id="sidenav"></div>

<!-- Summary Section -->
<h2>Portfolio Summary</h2>
<table id="summaryTable">
    <thead>
    <tr>
        <th>Total Invested</th>
        <th>Total Value</th>
        <th>Unrealised Gain/Loss</th>
        <th>Yearly Dividend Income</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td id="totalInvested">$0.00</td>
        <td id="totalValue">$0.00</td>
        <td id="totalProfit">$0.00</td>
        <td id="totalDividends">$0.00</td>
    </tr>
    </tbody>
</table>

<!-- Stocks Table -->
<h2>Stock Table</h2>
<table id="stocksTable">
    <thead>
    <tr>
        <th>Stock Name</th>
        <th>Stock Price</th>
        <th>Stock Quantity</th>
        <th>Current Price</th>
        <th>Dividend</th>
        <th>Total Dividend</th>
        <th>Total Value</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <!-- Rows will be inserted here -->
    </tbody>
</table>
</body>
</html>
