<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DCF Calculator</title>
  <script src="DCF_Calculator.js"></script>
  <script src="../Index/theme.js" defer></script>
  <link rel="stylesheet" href="DCF.css">
  <!--<link rel="stylesheet" href="../index.css">-->
  <script>
      fetch("../Index/index.html")
          .then(res => res.text())
          .then(data => {
              document.getElementById("navbar").innerHTML = data;
              const link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = "../Index/navbar.css";
              document.head.appendChild(link);

              initThemeToggle(); // call function AFTER navbar is ready
          });
  </script>

</head>
<body>
<div id="navbar"></div>
<h1>DCF = Discounted Cash Flow</h1>

<div class="form-container">
    <label>Current Share Price:
    <input type="number" id="currentSharePrice" placeholder="Ex:150$" required>
    </label>

    <label>Free Cash Flow Per Share (FCF):
    <input type="number" id="FCF" placeholder="Ex:7.05$" required>
    </label>

    <label>FCF Growth Rate (g):
    <input type="number" id="Growth" placeholder="Ex:5%" required>
    </label>

    <label>Total Years To Simulate (n):
    <input type="number" id="Years" placeholder="Ex:50 years" required>
    </label>

    <label>Discount Rate (k):
    <input type="number" id="Discount" placeholder="Ex:12%" required>
    </label>


  <button onclick="Input()">Regn ut</button>
  <div id="value"></div>
</div>
</body>
</html>
