<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Portfolio</title>
    <script src="Portfolio.js"></script>
    <link rel="stylesheet" href="Portfolio.css">
  <script>
    fetch("../Sidebar/Sidebar.html")
            .then(response => response.text())
            .then(data => {
              document.getElementById("sidenav").innerHTML = data;
              const link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = "../Sidebar/Sidebar.css";  // Adjust path accordingly
              document.head.appendChild(link);
            });
  </script>
  <style>
    h2{
      text-align: center;
    }
  </style>
</head>
<body>
<div id="sidenav"></div>
<h2>Stock Table</h2>
<table id="stocksTable">
    <thead>
    <tr>
        <th>Stock Name</th>
        <th>Stock Price</th>
        <th>Stock Quantity</th>
        <th>Current Price</th>
        <th>Dividend</th>
        <th>Total Dividend</th>
        <th>Total Price</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <!-- Rows will be inserted here -->
    </tbody>
</table>
</body>
</html>
